name: portfolio-monitor

on:
  schedule:
    - cron: '0 6 * * *'   # Daily 08:00 Prague (UTC+2)
  workflow_dispatch:        # Manual trigger

permissions:
  contents: read

jobs:
  check-all-repos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check CI status across portfolio
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_MONITOR_TOKEN }}
        run: |
          REPOS=(
            "vlamay/production-devsecops-kubernetes-pipeline"
            "vlamay/mlops-lite-aws"
            "vlamay/aws-eks-gitops-argo"
            "vlamay/web3-node-platform"
            "vlamay/terraform-modules"
            "vlamay/ai-platform-infra"
          )

          FAILED=0
          REPORT=""

          for REPO in "${REPOS[@]}"; do
            REPO_NAME="${REPO#vlamay/}"
            RUNS=$(gh api "repos/$REPO/actions/runs?per_page=10&branch=main" \
              --jq '.workflow_runs[] | {name: .name, status: .status, conclusion: .conclusion, created_at: .created_at}' \
              2>/dev/null || echo "")

            if [ -z "$RUNS" ]; then
              REPORT+="⚪ $REPO_NAME — no runs or no access\n"
              continue
            fi

            # Get last run per workflow name
            FAILURES=$(echo "$RUNS" | jq -rs '
              group_by(.name) |
              map(sort_by(.created_at) | last) |
              .[] | select(.conclusion == "failure" or .conclusion == "startup_failure") |
              "  ❌ \(.name): \(.conclusion)"
            ' 2>/dev/null || echo "")

            SUCCESS=$(echo "$RUNS" | jq -rs '
              group_by(.name) |
              map(sort_by(.created_at) | last) |
              .[] | select(.conclusion == "success") |
              "  ✅ \(.name)"
            ' 2>/dev/null || echo "")

            SKIPPED=$(echo "$RUNS" | jq -rs '
              group_by(.name) |
              map(sort_by(.created_at) | last) |
              .[] | select(.status == "in_progress" or .conclusion == "skipped") |
              "  🔄 \(.name): \(.status)"
            ' 2>/dev/null || echo "")

            if [ -n "$FAILURES" ]; then
              REPORT+="🔴 **$REPO_NAME**\n$FAILURES\n"
              FAILED=$((FAILED + 1))
            else
              REPORT+="🟢 **$REPO_NAME**\n$SUCCESS\n"
            fi
          done

          echo "=================================="
          echo "   PORTFOLIO CI HEALTH REPORT"
          echo "   $(date '+%Y-%m-%d %H:%M UTC')"
          echo "=================================="
          echo -e "$REPORT"

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "❌ $FAILED repo(s) have failing workflows!"
            exit 1
          else
            echo "✅ All repos green!"
          fi

      - name: Check stale branches
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_MONITOR_TOKEN }}
        run: |
          REPOS=(
            "vlamay/production-devsecops-kubernetes-pipeline"
            "vlamay/mlops-lite-aws"
            "vlamay/aws-eks-gitops-argo"
            "vlamay/web3-node-platform"
            "vlamay/terraform-modules"
            "vlamay/ai-platform-infra"
          )

          STALE_FOUND=0
          CUTOFF=$(date -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -v-7d '+%Y-%m-%dT%H:%M:%SZ')

          for REPO in "${REPOS[@]}"; do
            REPO_NAME="${REPO#vlamay/}"
            STALE=$(gh api "repos/$REPO/branches" \
              --jq --arg cutoff "$CUTOFF" \
              '.[] | select(.name != "main") |
               select(.commit.commit.committer.date < $cutoff) |
               "  ⚠️  \(.name) — last commit: \(.commit.commit.committer.date[:10])"' \
              2>/dev/null || echo "")

            if [ -n "$STALE" ]; then
              echo "🔶 $REPO_NAME — stale branches:"
              echo "$STALE"
              STALE_FOUND=$((STALE_FOUND + 1))
            fi
          done

          if [ "$STALE_FOUND" -eq 0 ]; then
            echo "✅ No stale branches found"
          fi
