name: Sentinel DevSecOps CI

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sentinel-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bandit Security Scan
        run: pip install bandit && bandit -r ./app -ll

      - name: Hadolint Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Build Docker Images
        run: docker compose build

      - name: Trivy Scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sentinel-backend:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Trivy Scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sentinel-frontend:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and Push Docker Images
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag sentinel-backend:latest ${{ secrets.DOCKER_USERNAME }}/sentinel-backend:${{ github.sha }}
          docker tag sentinel-backend:latest ${{ secrets.DOCKER_USERNAME }}/sentinel-backend:latest
          docker tag sentinel-frontend:latest ${{ secrets.DOCKER_USERNAME }}/sentinel-frontend:${{ github.sha }}
          docker tag sentinel-frontend:latest ${{ secrets.DOCKER_USERNAME }}/sentinel-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sentinel-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/sentinel-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sentinel-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/sentinel-frontend:latest

      - run: echo "✅ Pipeline completed successfully!"
