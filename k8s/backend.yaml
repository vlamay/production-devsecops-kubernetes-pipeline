apiVersion: apps/v1
kind: deployment
metadata:
  name: sentinel-backend
  labels:
    app: secure-auth-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-auth-backend
  template:
    metadata:
      labels:
        app: secure-auth-backend
    spec:
      containers:
      - name: secure-auth-backend-container
        image: mahmmadakhil/sentinel-backend:latest
        ports:
        - containerPort: 8081
        env:
        - name: BACKEND_URL
          value: "http://secure-auth-backend:8081"

---
apiVersion: v1
kind: Service
metadata:
  name: secure-auth-backend
spec:
  selector:
    app: secure-auth-backend
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
