apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-auth-frontend
  template:
    metadata:
      labels:
        app: secure-auth-frontend
    spec: # <--- Added this missing spec level
      containers:
      - name: secure-auth-frontend-container
        image: mahmmadakhil/sentinel-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: secure-auth-frontend
  type: NodePort
  ports:
  - port: 80
    nodePort: 30080
    targetPort: 80
