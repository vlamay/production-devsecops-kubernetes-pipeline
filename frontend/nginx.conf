server {
    listen 80;

    # 1. Serve the React Static Files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # This line prevents 404 errors when you refresh a page 
        # that uses React Router.
        try_files $uri $uri/ /index.html;
    }

    # 2. Bridge to the Backend
    # When the frontend calls "/api/register", Nginx sends it 
    # to the "backend" container on port 8000.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
