version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sentinel_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_pass
      - POSTGRES_DB=sentinel_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./app
    image: sentinel-backend:latest   #
    container_name: sentinel_backend
    environment:
      - PYTHONPATH=/
      - PASSLIB_BUILTIN_BCRYPT=true
      - USE_SQLITE=False
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres_pass
      - DB_NAME=sentinel_auth
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    image: sentinel-frontend:latest   # 
    container_name: sentinel_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
